services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dpdd_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-DPDD}
      DB_USER: ${DB_USER:-dpdd}
      DB_PASSWORD: ${DB_PASSWORD:-dpdd}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: dpdd_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-DPDD}
      MARIADB_USER: ${DB_USER:-dpdd}
      MARIADB_PASSWORD: ${DB_PASSWORD:-dpdd}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
