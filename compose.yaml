services:
  web:
    build: .
    container_name: dpdd_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:11
    container_name: dpdd_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: DPDD
      MARIADB_USER: dpdd_user
      MARIADB_PASSWORD: dpdd_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d

volumes:
  db_data: